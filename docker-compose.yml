version: "3.9"

services:
# ────────── Database ──────────
  db:
    image: ankane/pgvector                # pgvector-ready Postgres
    container_name: mercado-scrape-db
    environment:
      POSTGRES_USER:  postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db_dump.sql:/docker-entrypoint-initdb.d/db_dump.sql:ro
    ports:
      - "5432:5432"  # Exposed port matches your original note     - "5432:5432"

# ────────── Scraper (fat) ──────────
  scraper:
    build: ./scraper
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/cloud
      PYTHONUNBUFFERED: 1
      # Toggle SQS locally
      USE_SQS: "false"              # set to "true" only if running LocalStack
      SQS_QUEUE_URL: http://localstack:4566/000000000000/scraper.fifo
      SQS_REGION: us-east-1
    depends_on: [ db ]
    ports: [ "8001:8001" ]          # FastAPI lives here

# ────────── Backend (thin) ──────────
  backend:
    build: ./backend
    container_name: fastapi_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/cloud
      SCRAPER_URL: http://scraper:8001        # internal DNS name
      PYTHONUNBUFFERED: 1

      # --- Development Mode ---
      DEV_MODE: ${DEV_MODE:-false}

      # --- Cognito (real user-pool) ---
      COGNITO_POOL_ID: ${COGNITO_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      COGNITO_REGION: ${COGNITO_REGION:-us-east-1}

      # --- Optional AWS credentials if backend must call Cognito ---
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    depends_on: [ db, scraper ]

# ────────── LocalStack (only if you need SQS) ──────────
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    ports: [ "4566:4566" ]          # Edge port
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

# ────────── Frontend (optional) ──────────
  frontend:
    container_name: react_app
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_COGNITO_POOL_ID: ${COGNITO_POOL_ID}
        VITE_COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
        VITE_COGNITO_REGION: ${COGNITO_REGION:-us-east-1}
        VITE_COGNITO_DOMAIN: https://${COGNITO_POOL_ID}.auth.${COGNITO_REGION:-us-east-1}.amazoncognito.com
        VITE_COGNITO_LOGOUT_URI: ${COGNITO_LOGOUT_URI:-http://localhost:5173}
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm start"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_COGNITO_POOL_ID=${COGNITO_POOL_ID}
      - VITE_COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - VITE_COGNITO_REGION=${COGNITO_REGION:-us-east-1}
      - VITE_COGNITO_DOMAIN=https://${COGNITO_POOL_ID}.auth.${COGNITO_REGION:-us-east-1}.amazoncognito.com
      - VITE_COGNITO_LOGOUT_URI=${COGNITO_LOGOUT_URI:-http://localhost:5173}

volumes:
  pgdata:

